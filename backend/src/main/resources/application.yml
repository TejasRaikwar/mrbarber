server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mrbarber?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:160702}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    # Base64-encoded secret. Generate one with: openssl rand -base64 64
    secret: ${JWT_SECRET:c3VwZXJzZWNyZXRtcmJhcmJlcmp3dHNpZ25pbmdrZXl0aGF0c2hvdWxkYmVjaGFuZ2VkaW5wcm9k}
    expiration-ms: 86400000  # 24h
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
    public-base-url: ${UPLOADS_BASE_URL:http://localhost:8080/uploads}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:4173
  seed:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin123}

logging:
  level:
    org.springframework.security: INFO
